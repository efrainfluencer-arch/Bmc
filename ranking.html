<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ranking BMC</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div id="loading">
  <div class="loader-box">
    <h1>BMC</h1>
    <p>Carregando ranking...</p>
    <div class="bar">
      <div class="progress"></div>
    </div>
  </div>
</div>

<h1>🏆 BMC Ranking</h1>
<br>

<ul class="links">
<li>
  <a href="staff.html" class="link-btn staff">
    <span>🔒 Staff Panel</span>
    <small>Acesso administrativo</small>
  </a>
</li>
</ul>

<!-- 🔍 BUSCA -->
<input type="text" id="busca" placeholder="Buscar player..." oninput="filtrarPlayers()">

<!-- 🎮 ABAS -->
<div class="abas-dispositivo">
  <button onclick="trocarAba('todos')">Todos</button>
  <button onclick="trocarAba('mobile')">📱 Mobile</button>
  <button onclick="trocarAba('pc')">🖥️ PC</button>
  <button onclick="trocarAba('controle')">🎮 Controle</button>
</div>

<!-- 🏆 TOP GLOBAL -->
<div class="categoria">
  <h2>🏆 TOP GLOBAL</h2>
  <ul id="global" class="lista"></ul>
</div>

<!-- 📊 RANKING -->
<div id="ranking"></div>

<script type="module" src="app.js"></script>
</body>
</html>
